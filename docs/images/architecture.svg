<svg width="820" height="260" xmlns="http://www.w3.org/2000/svg">
<style>
.box { fill:#263238; stroke:#546e7a; stroke-width:2; rx:8 }
.text { fill:#eceff1; font-family:monospace; font-size:16 }
.arrow { stroke:#90caf9; stroke-width:2; marker-end:url(#arrow) }
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<polygon points="0 0, 10 3, 0 6" fill="#90caf9"></polygon>
</marker>
</defs>

<rect class="box" x="40" y="90" width="140" height="60"></rect>
<text class="text" x="70" y="125">User Input</text>

<rect class="box" x="240" y="90" width="170" height="60"></rect>
<text class="text" x="275" y="125">Calculator CLI</text>

<rect class="box" x="460" y="90" width="190" height="60"></rect>
<text class="text" x="495" y="125">RecursiveAstParser</text>

<rect class="box" x="700" y="90" width="100" height="60"></rect>
<text class="text" x="725" y="125">AST</text>

<line class="arrow" x1="180" y1="120" x2="240" y2="120"></line>
<line class="arrow" x1="410" y1="120" x2="460" y2="120"></line>
<line class="arrow" x1="650" y1="120" x2="700" y2="120"></line>

</svg>