<svg width="720" height="360" xmlns="http://www.w3.org/2000/svg">
  <rect width="720" height="360" rx="10" ry="10" fill="#263238"></rect>

  <circle cx="20" cy="20" r="6" fill="#ff5f56"></circle>
  <circle cx="40" cy="20" r="6" fill="#ffbd2e"></circle>
  <circle cx="60" cy="20" r="6" fill="#27c93f"></circle>

  <text x="20" y="60" font-family="monospace" font-size="16" fill="#4dd0e1">
  ======================================
  </text>

  <text x="20" y="85" font-family="monospace" font-size="16" fill="#4dd0e1">
  Simple Calculator CLI
  </text>

  <text x="20" y="110" font-family="monospace" font-size="16" fill="#4dd0e1">
  Commands: clear, q (quit)
  </text>

  <text x="20" y="140" font-family="monospace" font-size="16" fill="#ffd54f">
  calc&gt; 2+2
  </text>

  <text x="20" y="165" font-family="monospace" font-size="16" fill="#81c784">
  4.0
  </text>

  <text x="20" y="195" font-family="monospace" font-size="16" fill="#ffd54f">
  calc&gt; (1+2)*5
  </text>

  <text x="20" y="220" font-family="monospace" font-size="16" fill="#81c784">
  15.0
  </text>

  <text x="20" y="250" font-family="monospace" font-size="16" fill="#ffd54f">
  calc&gt; q
  </text>

  <text x="20" y="280" font-family="monospace" font-size="16" fill="#81c784">
  Goodbye! You performed 2 operations.
  </text>
</svg>