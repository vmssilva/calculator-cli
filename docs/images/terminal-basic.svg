<svg width="720" height="220" xmlns="http://www.w3.org/2000/svg">
  <rect width="720" height="220" rx="10" ry="10" fill="#263238"></rect>

  <circle cx="20" cy="20" r="6" fill="#ff5f56"></circle>
  <circle cx="40" cy="20" r="6" fill="#ffbd2e"></circle>
  <circle cx="60" cy="20" r="6" fill="#27c93f"></circle>

  <text x="20" y="60" font-family="monospace" font-size="18" fill="#ffd54f">
  $ java -jar calculator-cli.jar "2+2"
  </text>

  <text x="20" y="100" font-family="monospace" font-size="18" fill="#81c784">
  4.0
  </text>

  <text x="20" y="150" font-family="monospace" font-size="18" fill="#ffd54f">
  $ java -jar calculator-cli.jar "(10+5)*2"
  </text>

  <text x="20" y="190" font-family="monospace" font-size="18" fill="#81c784">
  30.0
  </text>
</svg>